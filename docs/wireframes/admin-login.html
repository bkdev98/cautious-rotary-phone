<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập quản trị - IUH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Be Vietnam Pro', 'sans-serif'] },
          colors: {
            primary: { 100: '#E6F0FF', 500: '#0066CC', 700: '#003399', 900: '#002266' },
            accent: { 100: '#FFF5E0', 500: '#FFB81C' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

  <!-- ANNOTATION: Full-height centered login — minimal, institutional.
       Blue gradient background on left half (desktop) or top strip (mobile). -->
  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

      <!-- Logo + Title -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto mb-4 bg-primary-700 rounded-full flex items-center justify-center">
          <span class="text-xl font-bold text-white">IUH</span>
        </div>
        <h1 class="text-xl font-bold text-gray-900">Quản trị hệ thống</h1>
        <p class="text-sm text-gray-500 mt-1">Khoa Thương Mại - Du Lịch</p>
      </div>

      <!-- Login form card -->
      <form id="loginForm" class="bg-white rounded-xl shadow-md border border-gray-100 p-6 md:p-8 space-y-4">

        <!-- Error message — hidden by default -->
        <div id="loginError" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
          Email hoặc mật khẩu không đúng.
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required placeholder="admin@iuh.edu.vn"
            class="w-full h-11 px-3 text-base border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
          <input type="password" id="password" name="password" required placeholder="••••••••"
            class="w-full h-11 px-3 text-base border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
        </div>

        <button type="submit"
          class="w-full h-11 bg-primary-700 text-white font-medium text-sm rounded-lg hover:bg-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors">
          Đăng nhập
        </button>
      </form>

      <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 IUH - Khoa Thương Mại - Du Lịch</p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Demo: redirect to dashboard
      window.location.href = 'admin-dashboard.html';
    });
  </script>

</body>
</html>
